<div style="font-family: 'Times New Roman', Georgia, serif; max-width: 794px; margin: 0 auto; padding: 40px 50px; background: #fff; color: #1a1a1a; line-height: 1.5; font-size: 12pt;">
  
  <!-- Letterhead -->
  <div style="text-align: center; border-bottom: 2px solid #1a1a1a; padding-bottom: 16px; margin-bottom: 24px;">
    <div style="margin-bottom: 8px;">
      <span style="font-size: 28pt; font-weight: bold; letter-spacing: 4px; color: #1E4620;">ORHC</span>
    </div>
    <div style="font-size: 10pt; letter-spacing: 2px; color: #333; font-weight: 600;">
      OFFICE OF THE REGISTRAR HIGH COURT
    </div>
    <div style="font-size: 9pt; color: #666; margin-top: 2px; letter-spacing: 1px;">
      REPUBLIC OF KENYA
    </div>
  </div>

  <!-- Reference & Date -->
  <div style="display: flex; justify-content: space-between; font-size: 10pt; margin-bottom: 20px; color: #555;">
    <div><strong>Ref:</strong> {{refNo}}</div>
    <div><strong>Date:</strong> {{date}}</div>
  </div>

  <!-- Address Block -->
  <div style="margin-bottom: 24px; font-size: 11pt; line-height: 1.4;">
    <div>{{to}}</div>
    <div style="margin-top: 4px;"><strong>RE:</strong> {{subject}}</div>
  </div>

  <!-- Salutation -->
  <div style="font-size: 11pt; margin-bottom: 16px;">
    Dear {{recipient}},
  </div>

  <!-- Body Content -->
  <div style="font-size: 11pt; line-height: 1.6; margin-bottom: 30px;">
    {{body}}
  </div>

  <!-- Signature Block -->
  <div style="margin-top: 40px;">
    <div style="font-size: 11pt; margin-bottom: 20px;">
      Yours sincerely,
    </div>
    <div id="sig-placeholder" style="width: 200px; height: 80px; margin-bottom: 4px;"></div>
    <div style="font-weight: bold; font-size: 12pt; color: #1a1a1a; margin-top: 4px;">
      {{registrarName}}
    </div>
    <div style="font-size: 11pt; color: #555;">
      {{registrarTitle}}
    </div>
    <div style="font-size: 10pt; color: #777; margin-top: 2px;">
      Date: __________________
    </div>
  </div>

</div>
